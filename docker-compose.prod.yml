version: "3.8"

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: url-shortener-ai:latest
    ports:
      - "8000:8000"
    environment:
      - DB_URL=sqlite:///./url_shortener.db
      - BASE_URL=http://localhost:8000
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
