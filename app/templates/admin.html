<!DOCTYPE html>
<html>
<head><title>Admin Panel</title></head>
<body>
<h1>All URLs</h1>
<table border="1">
<tr><th>Code</th><th>Long URL</th><th>Short URL</th><th>Created At</th><th>Last Clicked</th></tr>
{% for url in urls %}
<tr>
<td>{{ url.code }}</td>
<td>{{ url.resolved_original_url }}</td>
<td>{{ url.short_url }}</td>
<td>{{ url.created_at }}</td>
<td>{{ url.last_clicked_at }}</td>
</tr>
{% endfor %}
</table>
</body>
</html>
